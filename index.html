<!DOCTYPE html>
<html>
<head>
<title>AM | Portfolio</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
<style>
body,h1 {font-family: "Raleway", sans-serif}
body, html {height: 100%}
.bgimg {
  background-image: url('./Toronto.jpg');
  min-height: 100%;
  background-position: center;
  background-size: cover;
}
.w3-display-middle{
  position:absolute;
  background-color: rgba(0.5, 0.5, 0.5, 0.5); 
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  -ms-transform:translate(-50%,-50%)
}

.w3-jumbo{font-size:64px!important}
.w3-animate-top{position:relative;animation:animatetop 0.4s}
.w3-border-grey,.w3-hover-border-grey:hover,.w3-border-gray,.w3-hover-border-gray:hover{border-color:#9e9e9e!important}
.w3-large{font-size:18px!important}
.w3-center{text-align:center!important}
.w3-display-bottomleft{position:absolute;left:0;bottom:0}.w3-display-bottomright{position:absolute;right:0;bottom:0}
.w3-padding-large{padding:12px 24px!important}
.w3-xlarge{font-size:24px!important}
.w3-display-topleft{position:absolute;left:0;top:0}
.w3-display-container:hover .w3-display-hover{display:block}.w3-display-container:hover span.w3-display-hover{display:inline-block}.w3-display-hover{display:none}
.w3-animate-opacity{animation:opac 0.8s}@keyframes opac{from{opacity:0} to{opacity:1}}
.w3-text-white,.w3-hover-text-white:hover{color:#fff!important}



</style>
</head>
<body>



<div class="bgimg w3-display-container w3-animate-opacity w3-text-white">
  <div class="w3-display-topleft w3-padding-large w3-xlarge">
    Andrea Mascolo
  </div>
  <div class="w3-display-middle">
<h1 class="w3-jumbo w3-animate-top">COMING SOON</h1>
    <hr class="w3-border-grey" style="margin:auto;width:40%">
    <p class="w3-large w3-center">Website in manteinance </p>
    <p class="w3-large w3-center">For more details write to <a href="mailto:info.andreamascolo@gmail.com" onmouseover="this.style.color='#ff8700';" onmouseout="this.style.color='#ffffff';" style="color: rgb(255, 255, 255);">info.andreamascolo@gmail.com</a></p>
    
    
    
  </div>
  <div class="w3-display-bottomleft w3-padding-large">
    Credits to Andrea Mascolo
  </div>
</div>
</div>
</body>
</html>
